<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=no">
    <title>PDF Scanner Pro</title>
    <link rel="stylesheet" href="pdf.css">
    <script src="keywords.js"></script>
</head>
<body>

<div id="sidebar" class="sidebar">
    <div class="header">
        <div class="header-top">
            <button class="btn-icon" onclick="toggleTheme()" title="Toggle theme">&#9728;</button>
            <select class="list-select" id="keywordListSelect" title="Keyword list"></select>
            <label class="btn-action">
                Open
                <input type="file" id="folderInput" webkitdirectory directory multiple accept="application/pdf" style="display:none">
            </label>
            <button class="btn-icon" onclick="clearAllResults()" title="Clear">&#10005;</button>
        </div>
        <div class="progress-bar-wrap">
            <div class="progress-bar" id="progressBar"></div>
        </div>
    </div>

    <div class="stats-bar" id="statsBar">
        <span><strong id="countDocs">0</strong> docs</span>
        <span><strong id="countMatches">0</strong> matches</span>
    </div>

    <div id="results" class="results-area">
        <h1 class="status-msg">&#10548;</h1>
        <h1 class="status-msg">Drop a folder to begin scanning</h1>
    </div>

    <p class="attribution">Kevin Henderson - <b>08/04/2026</b></p>
</div>

<div id="resizer"></div>

<div class="viewer-container">
    <div id="viewerLoader">
        <div class="spinner"></div>
        <div class="loader-details">
            <div class="loader-filename" id="loaderFilename">Loading PDF...</div>
            <div class="loader-status" id="loaderStatus"></div>
            <div class="loader-progress-bar"><div class="loader-progress-fill" id="loaderProgressFill"></div></div>
        </div>
    </div>

    <div class="viewer-toolbar">
        <button onclick="zoomOut()" title="Zoom Out (Ctrl+-)">-</button>
        <span class="zoom-level" id="zoomLevel">100%</span>
        <button onclick="zoomIn()" title="Zoom In (Ctrl++)">+</button>
        <button onclick="zoomFit()" title="Fit Width">Fit</button>
        <button onclick="zoomActual()" title="Actual Size">1:1</button>
        <span class="separator">|</span>
        <button onclick="prevPage()" title="Previous page">&#8592;</button>
        <input type="number" class="page-input small" id="pageInput" min="1" placeholder="0" title="Go to page (G)">
        <span class="dim">/ <span id="pageTotal">0</span></span>
        <button onclick="nextPage()" title="Next page">&#8594;</button>
        <span class="separator" id="navSep" style="display:none;">|</span>
        <span class="nav-group" id="navGroup">
            <select class="keyword-select small" id="keywordSelect" title="Keyword"></select>
            <button onclick="findPrev()" title="Previous match">&#8592;</button>
            <input type="number" class="match-input small" id="matchInput" min="1" placeholder="0" title="Go to match number">
            <span class="dim">/ <span id="matchTotal">0</span></span>
            <button onclick="findNext()" title="Next match">&#8594;</button>
            <span class="match-counter" id="matchCounter">0 / 0</span>
            <button class="nav-clear" onclick="clearSearch()" title="Clear search">&#10005;</button>
        </span>
        <div class="toggle-container">
            <span class="toggle-label">Animate</span>
            <label class="toggle-switch">
                <input type="checkbox" id="animateToggle" checked>
                <span class="toggle-slider"></span>
            </label>
        </div>
    </div>

    <div class="viewer-scroll" id="viewerScroll">
        <div id="pdfViewer"></div>
    </div>
    <div class="heatmap-track" id="heatmapTrack"></div>
    <div class="heatmap-thumb" id="heatmapThumb"></div>
</div>

<div id="keywordManager">
    <div class="modal">
        <h3>Manage Keywords</h3>
        <p>Edit your search terms (one per line). Changes apply to new scans.</p>
        <textarea id="keywordInput"></textarea>
        <div class="modal-footer">
            <button onclick="toggleKeywordManager()" class="btn-action" style="flex:none; width:100px;">Cancel</button>
            <button onclick="updateKeywordsFromUI()" class="btn-action" style="flex:none; width:120px; background:var(--green); color:white; border:none;">Save & Apply</button>
        </div>
    </div>
</div>

<script src="pdf.js"></script>
</body>
</html>
